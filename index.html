<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            background-color: #faf8ef;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title {
            font-size: 60px;
            font-weight: bold;
            color: #776e65;
        }

        .score-container {
            display: flex;
            gap: 10px;
        }

        .score-box {
            background-color: #bbada0;
            padding: 10px 20px;
            border-radius: 6px;
            text-align: center;
        }

        .score-label {
            font-size: 12px;
            color: #eee4da;
            text-transform: uppercase;
            font-weight: bold;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .new-game-btn {
            background-color: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .new-game-btn:hover {
            background-color: #9f8b77;
        }

        .game-board {
            background-color: #bbada0;
            border-radius: 6px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            aspect-ratio: 1;
            touch-action: none;
        }

        .cell {
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            color: #776e65;
            position: relative;
        }

        .tile {
            width: 100%;
            height: 100%;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            transition: all 0.15s ease;
        }

        .tile-2 { background: #eee4da; color: #776e65; font-size: 36px; }
        .tile-4 { background: #ede0c8; color: #776e65; font-size: 36px; }
        .tile-8 { background: #f2b179; color: #f9f6f2; font-size: 36px; }
        .tile-16 { background: #f59563; color: #f9f6f2; font-size: 36px; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; font-size: 36px; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; font-size: 36px; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 30px; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 24px; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 24px; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 20px; }

        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            z-index: 100;
        }

        .game-message-title {
            font-size: 48px;
            font-weight: bold;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message-subtitle {
            font-size: 24px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message button {
            background-color: #8f7a66;
            color: #f9f6f2;
            border: none;
            padding: 10px 30px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .game-message button:hover {
            background-color: #9f8b77;
        }

        .game-message.won {
            background: rgba(237, 194, 46, 0.9);
        }

        .game-message.won .game-message-title {
            color: #f9f6f2;
        }

        .game-message.won .game-message-subtitle {
            color: #f9f6f2;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 40px;
            }

            .game-board {
                padding: 10px;
                gap: 10px;
            }

            .tile-2, .tile-4, .tile-8, .tile-16, .tile-32, .tile-64 {
                font-size: 28px;
            }

            .tile-128, .tile-256, .tile-512 {
                font-size: 24px;
            }

            .tile-1024, .tile-2048 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-container">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高分</div>
                    <div class="score-value" id="best">0</div>
                </div>
                <button class="new-game-btn" id="new-game">新游戏</button>
            </div>
        </div>
        <div class="game-board" id="game-board"></div>
    </div>

    <script>
        const gridSize = 4;
        let grid = [];
        let score = 0;
        let bestScore = 0;
        let gameOver = false;
        let won = false;
        let canContinue = true;

        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const newGameBtn = document.getElementById('new-game');

        let startX = 0;
        let startY = 0;

        function init() {
            grid = Array(gridSize).fill(null).map(() => Array(gridSize).fill(0));
            score = 0;
            gameOver = false;
            won = false;
            canContinue = true;
            
            addTile(2);
            addTile(2);
            addTile(2);
            
            updateScore();
            render();
        }

        function addTile(value) {
            const emptyCells = [];
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] === 0) {
                        emptyCells.push({ row: i, col: j });
                    }
                }
            }
            
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[randomCell.row][randomCell.col] = value;
            }
        }

        function addRandomTile() {
            const rand = Math.random();
            const value = rand < 0.9 ? 2 : 4;
            addTile(value);
        }

        function updateScore() {
            scoreDisplay.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('bestScore', bestScore);
            }
            bestDisplay.textContent = bestScore;
        }

        function render() {
            gameBoard.innerHTML = '';
            
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    
                    if (grid[i][j] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${Math.min(grid[i][j], 2048)}${grid[i][j] > 2048 ? ' tile-super' : ''}`;
                        tile.textContent = grid[i][j];
                        cell.appendChild(tile);
                    }
                    
                    gameBoard.appendChild(cell);
                }
            }
            
            if (gameOver) {
                const message = document.createElement('div');
                message.className = 'game-message';
                message.innerHTML = `
                    <div class="game-message-title">游戏结束!</div>
                    <div class="game-message-subtitle">最终得分: ${score}</div>
                    <button onclick="init()">再玩一次</button>
                `;
                gameBoard.appendChild(message);
            } else if (won && !canContinue) {
                const message = document.createElement('div');
                message.className = 'game-message won';
                message.innerHTML = `
                    <div class="game-message-title">你赢了!</div>
                    <div class="game-message-subtitle">得分: ${score}</div>
                    <button onclick="canContinue = true; render()">继续游戏</button>
                `;
                gameBoard.appendChild(message);
            }
        }

        function move(direction) {
            if (gameOver || (won && !canContinue)) return;
            
            const oldGrid = JSON.stringify(grid);
            
            if (direction === 'left') {
                moveLeft();
            } else if (direction === 'up') {
                moveUp();
            } else if (direction === 'right') {
                moveRight();
            } else if (direction === 'down') {
                moveDown();
            }
            
            const newGrid = JSON.stringify(grid);
            if (oldGrid !== newGrid) {
                addRandomTile();
                updateScore();
                checkGameOver();
                render();
            }
        }

        function moveLeft() {
            for (let i = 0; i < gridSize; i++) {
                let row = grid[i].filter(val => val !== 0);
                let mergedRow = [];
                
                for (let j = 0; j < row.length; j++) {
                    if (j + 1 < row.length && row[j] === row[j + 1]) {
                        const val = row[j] * 2;
                        mergedRow.push(val);
                        score += val;
                        if (val === 2048 && !won) {
                            won = true;
                        }
                        j++;
                    } else {
                        mergedRow.push(row[j]);
                    }
                }
                
                while (mergedRow.length < gridSize) {
                    mergedRow.push(0);
                }
                
                grid[i] = mergedRow;
            }
        }

        function moveRight() {
            for (let i = 0; i < gridSize; i++) {
                let row = grid[i].filter(val => val !== 0);
                let mergedRow = [];
                
                for (let j = row.length - 1; j >= 0; j--) {
                    if (j - 1 >= 0 && row[j] === row[j - 1]) {
                        const val = row[j] * 2;
                        mergedRow.unshift(val);
                        score += val;
                        if (val === 2048 && !won) {
                            won = true;
                        }
                        j--;
                    } else {
                        mergedRow.unshift(row[j]);
                    }
                }
                
                while (mergedRow.length < gridSize) {
                    mergedRow.unshift(0);
                }
                
                grid[i] = mergedRow;
            }
        }

        function moveUp() {
            for (let j = 0; j < gridSize; j++) {
                let col = [];
                for (let i = 0; i < gridSize; i++) {
                    if (grid[i][j] !== 0) {
                        col.push(grid[i][j]);
                    }
                }
                
                let mergedCol = [];
                for (let i = 0; i < col.length; i++) {
                    if (i + 1 < col.length && col[i] === col[i + 1]) {
                        const val = col[i] * 2;
                        mergedCol.push(val);
                        score += val;
                        if (val === 2048 && !won) {
                            won = true;
                        }
                        i++;
                    } else {
                        mergedCol.push(col[i]);
                    }
                }
                
                while (mergedCol.length < gridSize) {
                    mergedCol.push(0);
                }
                
                for (let i = 0; i < gridSize; i++) {
                    grid[i][j] = mergedCol[i];
                }
            }
        }

        function moveDown() {
            for (let j = 0; j < gridSize; j++) {
                let col = [];
                for (let i = 0; i < gridSize; i++) {
                    if (grid[i][j] !== 0) {
                        col.push(grid[i][j]);
                    }
                }
                
                let mergedCol = [];
                for (let i = col.length - 1; i >= 0; i--) {
                    if (i - 1 >= 0 && col[i] === col[i - 1]) {
                        const val = col[i] * 2;
                        mergedCol.unshift(val);
                        score += val;
                        if (val === 2048 && !won) {
                            won = true;
                        }
                        i--;
                    } else {
                        mergedCol.unshift(col[i]);
                    }
                }
                
                while (mergedCol.length < gridSize) {
                    mergedCol.unshift(0);
                }
                
                for (let i = 0; i < gridSize; i++) {
                    grid[i][j] = mergedCol[i];
                }
            }
        }

        function checkGameOver() {
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] === 0) return;
                    if (j < gridSize - 1 && grid[i][j] === grid[i][j + 1]) return;
                    if (i < gridSize - 1 && grid[i][j] === grid[i + 1][j]) return;
                }
            }
            gameOver = true;
        }

        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    move('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move('right');
                    break;
            }
        });

        gameBoard.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            e.preventDefault();
        }, { passive: false });

        gameBoard.addEventListener('touchend', (e) => {
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            
            const deltaX = endX - startX;
            const deltaY = endY - startY;
            const minDrag = 30;
            
            if (Math.abs(deltaX) >= minDrag || Math.abs(deltaY) >= minDrag) {
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    move(deltaX > 0 ? 'right' : 'left');
                } else {
                    move(deltaY > 0 ? 'down' : 'up');
                }
            }
        });

        gameBoard.addEventListener('mousedown', (e) => {
            startX = e.clientX;
            startY = e.clientY;
        });

        document.addEventListener('mouseup', (e) => {
            const endX = e.clientX;
            const endY = e.clientY;
            
            const deltaX = endX - startX;
            const deltaY = endY - startY;
            const minDrag = 30;
            
            if (Math.abs(deltaX) >= minDrag || Math.abs(deltaY) >= minDrag) {
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    move(deltaX > 0 ? 'right' : 'left');
                } else {
                    move(deltaY > 0 ? 'down' : 'up');
                }
            }
        });

        newGameBtn.addEventListener('click', init);

        const savedBest = localStorage.getItem('bestScore');
        if (savedBest) {
            bestScore = parseInt(savedBest);
        }

        init();
    </script>
</body>
</html>
